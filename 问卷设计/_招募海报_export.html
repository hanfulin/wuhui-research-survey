<!DOCTYPE html>
<!--
  问卷招募海报 · 导出专用 · 2026-05-19（v2：去副标题/暂去二维码/高清）
  勿删。无头 Chrome 截图源：window-size 1080x1920 + force-device-scale-factor=2
  → 输出 2160×3840 高密度 PNG（清晰度关键）。

  ★ 二维码：已按要求暂去。恢复 = 解除 QR-BLOCK 注释 + 放入 qr.png。
  ★ 医院照片：换授权高清图 = 命名 hospital.jpg 放同目录，改 .photo url。
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>科研经费包干制调查 · 招募海报</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    width:1080px; height:1920px; overflow:hidden; background:#fff;
    font-family:"Microsoft YaHei","PingFang SC",sans-serif;
  }
  .poster {
    width:1080px; height:1920px; background:#fff;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .photo {
    position:relative; height:28%;
    background:#0a3d62 center/cover no-repeat;
    background-image:
      linear-gradient(rgba(8,45,90,.30),rgba(8,45,90,.62)),
      url('https://bkimg.cdn.bcebos.com/smart/ae51f3deb48f8c5494eef6b04e753af5e0fe9825d1a2?x-bce-process=image/format,f_auto');
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:55px 54px; color:#fff;
  }
  .photo .badge {
    position:absolute; top:46px; left:54px;
    font-size:27px; letter-spacing:2px; opacity:.92;
    border:1px solid rgba(255,255,255,.65);
    padding:9px 20px; border-radius:6px;
  }
  .photo h1 { font-size:90px; font-weight:800; line-height:1.2;
               text-shadow:0 3px 12px rgba(0,0,0,.35); }

  .body { flex:1; padding:46px 72px; text-align:center;
          display:flex; flex-direction:column; justify-content:center; gap:26px; }
  .invite { font-size:40px; color:#0a3d62; font-weight:700;
            letter-spacing:3px; }
  .topic { font-size:58px; font-weight:800; color:#1a1a1a;
           line-height:1.35; }
  .tags { display:flex; justify-content:center; gap:20px;
          flex-wrap:wrap; }
  .tag { font-size:34px; background:#eaf2fb; color:#0a3d62;
         padding:14px 30px; border-radius:50px; font-weight:700; }
  .promise { font-size:34px; color:#444; line-height:1.65;
             background:#f4f7fa; border-radius:20px;
             padding:32px 40px; text-align:left; }
  .promise b { color:#0a3d62; }
  .who { font-size:36px; color:#0a3d62; font-weight:700; }

  /* 二维码预留区：虚线框占位，qr.png 放入后自动覆盖显示 */
  .qr-wrap { text-align:center; }
  .qr { width:340px; height:340px; margin:0 auto;
        border:4px dashed #b9c6d3; border-radius:18px;
        background:#fafcfe center/cover no-repeat;
        background-image:url('qr.png');
        display:flex; align-items:center; justify-content:center;
        color:#9aa9b8; font-size:30px; line-height:1.7; padding:24px; }
  .qr span { background:rgba(250,252,254,.82); padding:8px 12px;
             border-radius:6px; }
  .scan { font-size:40px; color:#0a3d62; font-weight:700; margin-top:18px; }

  .footer { background:#0a3d62; color:#dce9f5; text-align:center;
            padding:38px 48px; font-size:32px; line-height:1.7; }
</style>
</head>
<body>
  <div class="poster">

    <div class="photo">
      <div class="badge">匿名调查 · 诚邀参与</div>
      <h1>南通大学附属医院</h1>
    </div>

    <div class="body">
      <div class="invite">— 科研经费包干制落地情况调查 —</div>
      <div class="topic">您身边的科研经费<br>“包干制”用得顺手吗？</div>

      <div class="tags">
        <span class="tag">全程匿名</span>
        <span class="tag">约 5–8 分钟</span>
        <span class="tag">手机即可填</span>
      </div>

      <div class="promise">
        本调查为 <b>2026 年江苏省卫生健康经济管理研究课题</b>，
        旨在了解我院科研经费“包干制”落地现状，为优化管理制度提供依据。<br><br>
        <b>不记姓名、不记工号、不记科室</b>，数据仅作汇总分析，
        不与个人绩效考核挂钩。诚邀您如实填写，您的真实想法很重要。
      </div>

      <div class="qr-wrap">
        <div class="qr"><span>二维码预留位<br>发布后放入 qr.png</span></div>
        <div class="scan">微信扫码 · 即可填写</div>
      </div>

      <div class="who">科研人员 / 科研管理 / 财务审计 同事均可参与</div>
    </div>

    <div class="footer">
      课题单位：南通大学附属医院<br>
      2026 年江苏省卫生健康经济管理研究课题
    </div>

  </div>
</body>
</html>
